name: Container

# Builds AND publishes the jälki image (daemon + MCP + eBPF object) to GHCR on
# every push to main and on tags — it is the image the false-infra DaemonSet
# deploys, so it must track main. Per-PR smoke builds run only when something
# that actually changes the image changes; jälki has no other CI, so this is
# also the only automated build gate the repo has (the local
# fmt/clippy/test gate remains the review bar).
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "*/Cargo.toml"
      - "jalki-ebpf/**"
      - ".github/workflows/container.yml"
  workflow_dispatch:

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE: ghcr.io/false-systems/jalki

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build + (on main/tags) publish
    # arm64-native to match the cluster workers; arc-arm64 runners carry the
    # Docker-in-Docker sidecar, so buildx works self-hosted. The eBPF object
    # (bpfel-unknown-none) is arch-independent bytecode, but the daemon binary
    # is arm64.
    runs-on: arc-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build (+ push on main/tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
